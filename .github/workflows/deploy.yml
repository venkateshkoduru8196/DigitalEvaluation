name: Deploy to Plesk

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Build React
      run: |
        cd DigitalEvaluationReact
        npm install
        npm run build

    - name: Copy React build
      run: |
        xcopy /E /I /Y DigitalEvaluationReact\dist\* DIGITALEVALUATIONAPT\wwwroot\

    - name: Publish .NET
      run: dotnet publish DIGITALEVALUATIONAPT -c Release -o ./publish

    - name: Deploy FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish/