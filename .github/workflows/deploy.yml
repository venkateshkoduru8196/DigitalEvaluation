name: Deploy to Plesk

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Node setup
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # Debug path
      - name: Debug path
        run: |
          pwd
          ls

      # Build React
      - name: Build React
  run: |
    echo "Current folder:"
    pwd
    echo "Files here:"
    ls

    echo "Going into React folder"
    cd DigitalEvaluationReact

    echo "Now inside:"
    pwd
    ls

    npm install
    npm run build

      # .NET setup
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      # Publish .NET
      - name: Publish .NET
        run: dotnet publish DIGITALEVALUATIONAPT -c Release -o publish

      # FTP Deploy
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: publish