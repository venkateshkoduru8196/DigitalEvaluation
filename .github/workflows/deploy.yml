name: Deploy to Plesk

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Node (for React / Vite)
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3. Build React
      - name: Build React
        run: |
          cd DigitalEvaluationReact
          npm install
          npm run build

      # 4. Copy React build into .NET wwwroot (FIXED PATH)
      - name: Copy React build to .NET
        run: |
          mkdir -p DIGITALEVALUATIONAPT/DIGITALEVALUATION/wwwroot
          cp -r DigitalEvaluationReact/dist/* DIGITALEVALUATIONAPT/DIGITALEVALUATION/wwwroot/

      # 5. Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      # 6. Publish .NET (FIXED PATH)
      - name: Publish .NET
        run: dotnet publish DIGITALEVALUATIONAPT/DIGITALEVALUATION -c Release -o publish

      # 7. Deploy to Plesk via FTP
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: publish/
          server-dir: httpdocs/