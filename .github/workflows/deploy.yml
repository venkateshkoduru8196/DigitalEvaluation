name: Deploy to Plesk

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # Setup Node (REQUIRED for Vite)
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # Build React
      - name: Build React
        run: |
          cd DigitalEvaluationReact
          npm install
          npm run build

      # 🔥 IMPORTANT: Copy React build into .NET wwwroot
      - name: Copy React build to .NET
        run: |
          cp -r DigitalEvaluationReact/dist/* DIGITALEVALUATIONAPT/wwwroot/

      # Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      # Publish .NET
      - name: Publish .NET
        run: dotnet publish DIGITALEVALUATIONAPT -c Release -o publish

      # Deploy via FTP (FINAL FIX)
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: publish/
          server-dir: httpdocs/